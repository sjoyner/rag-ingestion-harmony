# document-ingestion-app.yaml
#
# Deploys the document-ingestion-service to the rag-cluster kind cluster.
#
# Resources in this file (applied in dependency order by Harmony):
#   1. HelmRepository  — registers the Dapr Helm chart repository
#   2. HelmRelease     — installs Dapr into the cluster (required for SQS binding)
#   3. KubernetesApp   — applies LocalStack (SQS emulator) into the cluster
#   4. KubernetesApp   — applies all manifests in manifests/document-ingestion/
#
# Harmony sequences them correctly:
#   cluster ready → (Dapr installed, harmony-agent deployed, LocalStack ready)
#     → app manifests applied
#
# Secrets are managed by the harmony-agent (see harmony-agent.yaml). The agent
# watches for secret changes in the Harmony control plane and pushes values into
# the "document-ingestion-secrets" Kubernetes Secret automatically via mTLS gRPC.
#
# Directory layout (dir:// resolved relative to git repo root):
#
#   manifests/localstack/
#   ├── namespace.yaml              Namespace: localstack
#   ├── deployment.yaml             LocalStack deployment (SERVICES=sqs)
#   └── service.yaml                ClusterIP on port 4566
#
#   manifests/document-ingestion/
#   ├── namespace.yaml              Namespace: document-ingestion
#   ├── serviceaccount.yaml         ServiceAccount for the pod
#   ├── configmap.yaml              Non-sensitive runtime configuration
#   ├── secret.yaml                 Note: secrets managed by harmony-agent
#   ├── harmonysecretbinding-crd.yaml  CRD definition for HarmonySecretBinding
#   ├── harmonysecretbinding.yaml   Maps Harmony secrets → K8s Secret keys
#   ├── dapr-component.yaml         Dapr SQS input binding (→ LocalStack)
#   ├── nvidia-device-plugin.yaml   NVIDIA device plugin DaemonSet (kube-system)
#   ├── pvc.yaml                    PVC for HuggingFace model cache (60 Gi)
#   ├── deployment.yaml             Pod: app + nemotron vLLM + embedder vLLM
#   └── service.yaml                ClusterIP on port 8000

---
apiVersion: harmony.io/v1alpha1
kind: HelmRepository
metadata:
  name: dapr
spec:
  provider: helm
  name: dapr
  url: https://dapr.github.io/helm-charts/
  state: present

---
apiVersion: harmony.io/v1alpha1
kind: HelmRelease
metadata:
  name: dapr
  labels:
    app: rag
spec:
  provider: helm
  clusterRef: rag-cluster
  chart: dapr
  version: "1.14.4"
  kubeNamespace: dapr-system
  releaseName: dapr
  wait: true
  values:
    global:
      ha:
        enabled: false
  dependsOn:
    - kind: KindCluster
      name: rag-cluster
    - kind: HelmRepository
      name: dapr

---
apiVersion: harmony.io/v1alpha1
kind: KubernetesApp
metadata:
  name: localstack
  labels:
    app: rag
spec:
  provider: helm
  clusterRef: rag-cluster
  kubeNamespace: localstack
  source:
    path: dir://manifests/localstack/
  state: present
  dependsOn:
    - kind: KindCluster
      name: rag-cluster

---
apiVersion: harmony.io/v1alpha1
kind: KubernetesApp
metadata:
  name: document-ingestion
  labels:
    app: rag
spec:
  provider: helm
  clusterRef: rag-cluster
  kubeNamespace: document-ingestion
  source:
    path: dir://manifests/document-ingestion/
  state: present
  dependsOn:
    - kind: KindCluster
      name: rag-cluster
    - kind: HelmRelease
      name: dapr
    - kind: KubernetesAgent
      name: rag-cluster-agent
    - kind: KubernetesApp
      name: localstack
