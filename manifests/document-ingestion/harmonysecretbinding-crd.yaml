apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: harmonysecretbindings.harmony.io
  labels:
    app.kubernetes.io/managed-by: harmony
spec:
  group: harmony.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [environment, target, bindings]
              properties:
                environment:
                  type: string
                  description: Harmony environment name where secrets are stored.
                target:
                  type: object
                  required: [secretName]
                  properties:
                    secretName:
                      type: string
                      description: Name of the Kubernetes Secret to create or update.
                    namespace:
                      type: string
                      description: >
                        Namespace for the target Secret. Defaults to the namespace
                        of this HarmonySecretBinding resource when omitted.
                bindings:
                  type: array
                  description: Mappings from Harmony secret names to Kubernetes Secret keys.
                  items:
                    type: object
                    required: [harmonyKey, targetKey]
                    properties:
                      harmonyKey:
                        type: string
                        description: Name of the Secret resource in Harmony.
                      targetKey:
                        type: string
                        description: Key in the Kubernetes Secret data map.
  scope: Namespaced
  names:
    plural: harmonysecretbindings
    singular: harmonysecretbinding
    kind: HarmonySecretBinding
    shortNames:
      - hsb
