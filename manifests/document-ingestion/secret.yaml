# Secrets are managed by the harmony-agent via HarmonySecretBinding.
#
# The "document-ingestion-secrets" Kubernetes Secret is created and kept
# up-to-date automatically by the harmony-agent Deployment running in the
# harmony-system namespace. No manual kubectl or out-of-band process is needed.
#
# See:
#   manifests/document-ingestion/harmonysecretbinding.yaml  — binding definition
#   harmony-agent.yaml (project root)                       — Harmony Secret resources
#
# To set or rotate a secret value:
#
#   hctl secret set-value --env rag doc-ingestion-anthropic-api-key sk-ant-...
#
# The agent will push the new value to the cluster within seconds.
