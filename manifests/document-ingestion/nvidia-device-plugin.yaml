# NVIDIA Device Plugin — exposes nvidia.com/gpu resources to the scheduler.
#
# Applied to kube-system. Deploy this once after the kind cluster is created
# and before any GPU workloads are scheduled.
#
# GPU time-slicing is configured here to allow two containers (nemotron and
# embedder) to share a single physical GPU. Each vLLM container requests 1
# nvidia.com/gpu, and the device plugin advertises 2 virtual GPUs from each
# physical one. The containers share the physical GPU's VRAM — the total
# footprint (~23 GB) fits within a single 24 GB card (A40/A100/RTX 4090).
#
# Adjust `replicas: 2` if you have more than one GPU or a different count.

---
apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-device-plugin

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: time-slicing-config
  namespace: kube-system
data:
  any: |-
    version: v1
    flags:
      migStrategy: none
    sharing:
      timeSlicing:
        renameByDefault: false
        failRequestsGreaterThanOne: false
        resources:
          - name: nvidia.com/gpu
            replicas: 2

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin
  namespace: kube-system
  labels:
    app: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      app: nvidia-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nvidia-device-plugin
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin
          image: nvcr.io/nvidia/k8s-device-plugin:v0.17.0
          args:
            - --config-file=/etc/nvidia/time-slicing-config.yaml
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: time-slicing-config
              mountPath: /etc/nvidia
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: time-slicing-config
          configMap:
            name: time-slicing-config
            items:
              - key: any
                path: time-slicing-config.yaml
