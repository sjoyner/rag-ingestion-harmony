# HarmonySecretBinding: document-ingestion-secrets
#
# Instructs the harmony-agent running in this cluster to fetch the named
# Harmony secrets and write them into the "document-ingestion-secrets"
# Kubernetes Secret in this namespace. The agent watches for changes and
# pushes updates automatically — no manual kubectl or Sealed Secrets tooling
# is required.
#
# The Harmony Secret resources that back these entries are declared in
# harmony-agent.yaml at the project root. Set their values via:
#
#   hctl secret set-value --env <environment> <secret-name> <value>
#
# The harmony-agent will sync the values into this K8s Secret within seconds.

apiVersion: harmony.io/v1alpha1
kind: HarmonySecretBinding
metadata:
  name: document-ingestion-secrets
  namespace: document-ingestion
  labels:
    app: document-ingestion
    app.kubernetes.io/managed-by: harmony
spec:
  # Must match the Harmony environment where the secrets below are stored.
  environment: rag
  target:
    secretName: document-ingestion-secrets
    # namespace defaults to this resource's namespace (document-ingestion)
  bindings:
    - harmonyKey: doc-ingestion-anthropic-api-key
      targetKey: ANTHROPIC_API_KEY
    - harmonyKey: doc-ingestion-documents-s3-bucket
      targetKey: DOCUMENTS_S3_BUCKET
    - harmonyKey: doc-ingestion-entity-service-base-url
      targetKey: ENTITY_SERVICE_BASE_URL
    - harmonyKey: doc-ingestion-entity-service-auth-url
      targetKey: ENTITY_SERVICE_AUTH_URL
    - harmonyKey: doc-ingestion-entity-service-client-id
      targetKey: ENTITY_SERVICE_CLIENT_ID
    - harmonyKey: doc-ingestion-entity-service-client-secret
      targetKey: ENTITY_SERVICE_CLIENT_SECRET
    - harmonyKey: doc-ingestion-vector-db-dsn
      targetKey: VECTOR_DB_DSN
    - harmonyKey: doc-ingestion-aws-access-key-id
      targetKey: AWS_ACCESS_KEY_ID
    - harmonyKey: doc-ingestion-aws-secret-access-key
      targetKey: AWS_SECRET_ACCESS_KEY
    - harmonyKey: doc-ingestion-hugging-face-hub-token
      targetKey: HUGGING_FACE_HUB_TOKEN
