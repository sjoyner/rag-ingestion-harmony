apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  namespace: localstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: gateway
              containerPort: 4566
              protocol: TCP
          env:
            # Only start the SQS service to keep the container lightweight.
            - name: SERVICES
              value: "sqs"
            - name: DEFAULT_REGION
              value: "us-east-1"
            # Eagerly create the queue used by the document-ingestion Dapr binding.
            - name: SQS_ENDPOINT_STRATEGY
              value: "path"
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
